<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>수행평가 일정</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#007AFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="수행평가 일정">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css?v=6">
</head>
<body>
  <header>
    <div class="header-left">
      <h1>수행평가 일정</h1>
    </div>
    <div class="header-controls">
      <button class="btn-icon-round" id="refreshBtn" onclick="loadData()" title="새로고침" aria-label="새로고침">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 4v6h-6"></path>
          <path d="M1 20v-6h6"></path>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
      </button>
    </div>
  </header>

  <div class="app-container">
    <div id="alert-section" class="alert-section">
      <div id="urgentList" class="urgent-list" hidden></div>
    </div>

    <div class="wrapper">
      <div id="scroll-container" class="scroll-container">
        <div class="state-container"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="script.js?v=7"></script>
</body>
</html>
